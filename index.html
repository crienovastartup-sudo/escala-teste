<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escala - Templo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* Cores dos Cards com FONTES PRETAS (#000000) */
        .card-batisterio { background-color: #e0f2fe !important; border-color: #0ea5e9 !important; color: #000000 !important; }
        .card-recepcao { background-color: #fefce8 !important; border-color: #eab308 !important; color: #000000 !important; }
        .card-selamento { background-color: #ffdceb !important;  /* rosa claro */ border-color: #ec4899 !important;      /* rosa mais forte na borda */ color: #000000 !important; }
        .card-default { background-color: #f1f5f9 !important; border-color: #94a3b8 !important; color: #000000 !important; }
        
        .fc-event { border: none !important; background: transparent !important; padding: 0 !important; margin: 1px 0 !important; }
        .event-card-custom { transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-left-width: 4px; }
        .modal-blur { backdrop-filter: blur(8px); background-color: rgba(15, 23, 42, 0.4); }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* REMOVER "ALL-DAY" E COLUNA DE HORA NA VISUALIZAÇÃO DE LISTA */
        .fc-list-event-time { display: none !important; }
        .fc-list-event-dot { display: none !important; }
        .fc-list-event-title { padding-left: 0 !important; }
        .fc-list-table { border-collapse: separate; border-spacing: 0 8px; }
        .fc-list-day-cushion { background-color: #f1f5f9 !important; }

        /* Mobile Optimization for Calendar */
        @media (max-width: 640px) {
            .fc-toolbar-title { font-size: 1.1rem !important; }
            .fc-header-toolbar { flex-direction: column; gap: 10px; }
            .fc-view-harness { height: 600px !important; }
            .event-card-custom { padding: 4px !important; }
            /* Garante que o texto preto não fique pequeno demais no celular */
            .event-card-custom span { font-size: 9px !important; font-weight: 700 !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Modal Escala (Novo/Editar) -->

                            <option value="SEGUNDO PARC">Segundo Parcial (12h30-18h)</option>
                            <option value="TERCEIRO">Terceiro (17h30-21h)</option>
                        </select>
                    </div>
    
                    <!-- NOVOS CAMPOS EXCLUSIVOS PARA RECEPÇÃO -->
                    <div id="container-horarios-recepcao" class="hidden grid grid-cols-2 gap-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 animate-in fade-in slide-in-from-top-2">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-blue-600 uppercase">Hora Inicial</label>
                            <select id="escala-hora-inicial" class="w-full p-2.5 bg-white rounded-lg border border-blue-200 text-xs font-bold outline-none"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-blue-600 uppercase">Hora Final</label>

                        </div>
                    </div>

        <script>
            // Inicialização de ícones
            lucide.createIcons();
    
            // Lógica de Modais
            window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
            window.closeModal = (id) => {
                document.getElementById(id).classList.add('hidden');
                if(id === 'modal-escala') resetRecepcaoFields();
            };
    
            window.openEscalaModal = () => { 
                document.getElementById('form-escala').reset(); 
                document.getElementById('escala-id-original').value = ''; 
                document.getElementById('escala-modal-title').innerText = 'Agendar Escala';
                resetRecepcaoFields();
                openModal('modal-escala'); 
            };
    
            // --- LÓGICA DE HORÁRIOS PARA RECEPÇÃO ---
            const setorSelect = document.getElementById('escala-setor');
            const turnoSelect = document.getElementById('escala-turno');
            const containerHorarios = document.getElementById('container-horarios-recepcao');
    
            function popularDropdownHorarios(turno) {
                const inicioSel = document.getElementById('escala-hora-inicial');
                const fimSel = document.getElementById('escala-hora-final');
                
                let startHour, endHour;
    
                if (turno === 'PRIMEIRO') { startHour = 7; endHour = 13; }
                else if (turno === 'SEGUNDO') { startHour = 12; endHour = 18; }
                else if (turno === 'SEGUNDO PARC') { startHour = 12; endHour = 18; }    
                else if (turno === 'TERCEIRO') { startHour = 17; endHour = 21; }
                else { startHour = 7; endHour = 21; }
    
                let options = '<option value="">Selecione</option>';
                for (let h = startHour; h <= endHour; h++) {
                    for (let m = 0; h === endHour ? m === 0 : m < 60; m += 30) {
                        const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                        options += `<option value="${time}">${time}</option>`;
                    }
                }
                inicioSel.innerHTML = options;
                fimSel.innerHTML = options;
            }
    
            function handleRecepcaoDisplay() {
                if (setorSelect.value === 'RECEPÇÃO') {
                    containerHorarios.classList.remove('hidden');
                    popularDropdownHorarios(turnoSelect.value);
                } else {
                    containerHorarios.classList.add('hidden');
                }
            }
    
            function resetRecepcaoFields() {
                containerHorarios.classList.add('hidden');
                document.getElementById('escala-hora-inicial').innerHTML = '';
                document.getElementById('escala-hora-final').innerHTML = '';
            }
    
            setorSelect.addEventListener('change', handleRecepcaoDisplay);
            turnoSelect.addEventListener('change', () => {
                if (setorSelect.value === 'RECEPÇÃO') popularDropdownHorarios(turnoSelect.value);
            });

    
            document.getElementById('form-escala').onsubmit = (e) => {
                e.preventDefault();
                // Lógica de salvamento aqui capturando os novos campos se visíveis
                const dados = {
                    setor: setorSelect.value,
                    hora_inicial: document.getElementById('escala-hora-inicial').value,
                    hora_final: document.getElementById('escala-hora-final').value
                };
                console.log("Dados salvos:", dados);
                closeModal('modal-escala');
            };
        </script>
    
    <div id="loading" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-sm hidden flex flex-col items-center justify-center gap-4">
        <div class="loading-spinner"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbydJsVPa1rLUYG9jU9ncLjIbSBCrE5iqymf7wC28J0SomsTJavLBC6cUSjaixfzl7j1JQ/exec";
        const CLOUD_NAME = "dwlrxb6a0";
        const UPLOAD_PRESET = "ml_default";
        
        let oficiantes = [];
        let escala = [];
        let calendar;

        window.onload = () => {
            lucide.createIcons();
            initCalendar();
            fetchData();
            setupListeners();
            switchTab('calendar');
        };

        function setupListeners() {
            ['filter-setor', 'filter-turno', 'filter-oficiante'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
            });
        }

        /**
         * Adicione este input na sua área de Gestão de Escala (HTML):
         * <input type="month" id="gestao-month-filter" onchange="renderGestaoEscala()" class="p-2 border rounded-xl text-xs">
         */
        
        // Função atualizada para renderizar a Gestão de Escala com filtro de mês
        function renderGestaoEscala() {
            const container = document.getElementById('gestao-escala-lista');
            const monthFilter = document.getElementById('gestao-month-filter')?.value; // Ex: "2024-05"
             //gestao escala 
            const filtroMes = document.getElementById("gestao-month-filter").value;
            const filtroOficiante = document.getElementById("gestao-oficiante-filter").value;
            const filtroTurno = document.getElementById("gestao-turno-filter").value;
            
            let dadosFiltrados = escala;
            
            if (!container) return;
            container.innerHTML = '';
           
            
            //filtro no mes
            if (filtroMes) {

                dadosFiltrados = dadosFiltrados.filter(e => 
                    e.data.startsWith(filtroMes)
                );
            
            }
            
            //filtro oficiante
            if (filtroOficiante) {

                dadosFiltrados = dadosFiltrados.filter(e =>
                    String(e.id_oficiante) === String(filtroOficiante)
                );
            
            }
            
            //filtro turno
            if (filtroTurno) {

                dadosFiltrados = dadosFiltrados.filter(e =>
                    e.turno === filtroTurno
                );
            
            }
            
            dadosFiltrados.sort((a, b) => new Date(b.data) - new Date(a.data));

            if (dadosFiltrados.length === 0) {
                container.innerHTML = '<div class="p-4 text-center opacity-50 text-xs">Nenhum registro encontrado para este período.</div>';
                return;
            }
            
           dadosFiltrados.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl hover:shadow-sm transition-all';
                
                // Formatar data para exibição
                const dataLimpa = item.data.split("T")[0];
                const [ano, mes, dia] = dataLimpa.split("-");
                const dataFormatada = `${dia}/${mes}/${ano}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold">
                            ${item.nome_oficiante.substring(0, 2).toUpperCase()}
                        </div>
                        <div>
                            <div class="text-xs font-bold">${item.nome_oficiante}</div>
                            <div class="text-[10px] opacity-60 uppercase">${dataFormatada} • ${item.turno} • ${item.setor}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='editEscalaItem(${JSON.stringify(item)})' class="p-2 hover:bg-slate-100 rounded-lg text-blue-600 transition-colors">
                            <i data-lucide="pencil" class="w-4 h-4"></i>
                        </button>

         * Coloque esta função logo no início do seu <script> no arquivo principal.
         * Ela limpa o "1899-12-30" e o fuso horário.
         */
        const formatarHora = (valor) => {
            if (!valor) return "";
            let str = String(valor).trim();
            
            // Se o valor começar com o apóstrofo (forçado na planilha), removemos para exibição
            if (str.startsWith("'")) {
                str = str.substring(1);
            }
        
            // Corrige o formato ISO vindo do Sheets (1899-12-30T10:00:00)
            if (str.includes('T')) {
                str = str.split('T')[1];
            }
            
            // Busca o padrão HH:mm (ex: 07:00)
            const match = str.match(/(\d{1,2}):(\d{2})/);
            if (match) {
                return `${match[1].padStart(2, '0')}:${match[2]}`;
            }
            return str.substring(0, 5);
        };

        function formatarDataLimpa(dataStr) {
            if (!dataStr) return { dataFormatada: "---", diaSemana: "---" };
            const p = dataStr.substring(0, 10).split('-');
            const d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]), 12, 0, 0);
            const dias = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            return { dataFormatada: `${p[2]}/${p[1]}/${p[0]}`, diaSemana: dias[d.getDay()] };
        }

        function getFilteredData() {
            const fS = document.getElementById('filter-setor').value;
            const fT = document.getElementById('filter-turno').value;
            const fO = document.getElementById('filter-oficiante').value;
            
            // Obtém período visível no calendário
            const view = calendar.view;
            const start = view.activeStart;
            const end = view.activeEnd;

            return escala.filter(item => {
                const itemDate = new Date(item.data.substring(0, 10) + "T12:00:00");

                const matchesDate = itemDate >= start && itemDate < end;

            });

         // hora simples
            function formatarHoraSimples(valor) {
            
                if (!valor) return "";
            
                try {
            
                    if (valor instanceof Date) {
                        return valor.toLocaleTimeString('pt-BR', {
                            hour: '2-digit',
                            minute: '2-digit',
                            hour12: false
                        });
                    }
            
                    let str = String(valor).trim();
            
                    if (str.includes("T")) {
                        const date = new Date(str);
                        if (!isNaN(date.getTime())) {
                            return date.toLocaleTimeString('pt-BR', {
                                hour: '2-digit',
                                minute: '2-digit',
                                hour12: false
                            });
                        }
                    }
            
                    const match = str.match(/(\d{1,2}):(\d{2})/);
                    if (match) {
                        return `${match[1].padStart(2,'0')}:${match[2]}`;
                    }
            
                    return "";
            
                } catch (e) {
                    return "";
                }
            };
        
        /**
         * Função auxiliar robusta para evitar "Invalid Data".
         * Ela trata a string de data diretamente sem depender do fuso horário do sistema.
         */
        function formatarDataComDia(dataInput) {

            const diasAbrev = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        
            if (!dataInput) return { dataFormatada: "---", diaSemana: "" };
        
            try {
        
                let dataObj;
        
                if (dataInput instanceof Date) {
                    dataObj = dataInput;
                } 
                else if (typeof dataInput === 'string' && dataInput.includes('-')) {
                    const partes = dataInput.split('T')[0].split('-');
                    dataObj = new Date(partes[0], partes[1] - 1, partes[2]);
                } 
                else {
                    dataObj = new Date(dataInput);
                }
        
                if (isNaN(dataObj.getTime())) {
                    return { 
                        dataFormatada: String(dataInput).substring(0,10), 
                        diaSemana: "" 
                    };
                }
        
                const dataFormatada = dataObj.toLocaleDateString('pt-BR');
                const diaSemana = diasAbrev[dataObj.getDay()];
        
                return { dataFormatada, diaSemana };
        
            } catch (e) {
                return { dataFormatada: "Erro", diaSemana: "" };
            }
        }

        
        window.relatorioCalendarioLista = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // 1. Obter dados e ordenar por Data e depois por Turno
            const rawData = typeof getFilteredData === 'function' ? getFilteredData() : [];
            const dataOrdenada = [...rawData].sort((a, b) => {
                const dataA = (a.data || "").toString();
                const dataB = (b.data || "").toString();
                
                if (dataA !== dataB) return dataA.localeCompare(dataB);
                
                const pesoA = turnosOrder[(a.turno || "").toUpperCase()] || 99;
                const pesoB = turnosOrder[(b.turno || "").toUpperCase()] || 99;
                return pesoA - pesoB;
            });
            
            doc.setFontSize(16); doc.text("Escala: Calendário em Lista", 14, 15);
            doc.setFontSize(10); 
            const subtitulo = typeof calendar !== 'undefined' ? `Filtro: ${calendar.view.title}` : "";
            doc.text(subtitulo, 14, 22);
            
            const rows = dataOrdenada.map(e => {
                const info = formatarDataComDia(e.data);
                const diaReduzido = info.diaSemana.split('-')[0]; // Pega "SEGUNDA" de "SEGUNDA-FEIRA"
                return [
                    info.diaSemana ? `${info.dataFormatada} (${diaReduzido})` : info.dataFormatada,
                    e.turno || "",
                    e.setor || "",
                    e.nome_oficiante || ""
                ];
            });
            
            doc.autoTable({ 
                head: [['Data', 'Turno', 'Setor', 'Oficiante']], 
                body: rows, 
                startY: 28,
                theme: 'striped',
                headStyles: { fillColor: [40, 40, 40] }
            });
            
            doc.save(`escala_lista_${new Date().getTime()}.pdf`);
        };

                if (dataA !== dataB) return dataA.localeCompare(dataB);

        window.relatorioEscalaPorOficiante = function() {
            const { jsPDF } = window.jspdf;
            
            const doc = new jsPDF();
            const rawData = typeof getFilteredData === 'function' ? getFilteredData() : [];
           // Agrupa por ID e pega também o nome
            const oficiantesMap = {};
            
            rawData.forEach(e => {
                if (!e.id_oficiante) return;
                if (!oficiantesMap[e.id_oficiante]) {
                    oficiantesMap[e.id_oficiante] = e.nome_oficiante || "Oficiante s/ nome";
                }
            });
            
            // Converte para array e ordena alfabeticamente pelo nome
            const oficiantesOrdenados = Object.entries(oficiantesMap)
                .sort((a, b) => a[1].localeCompare(b[1], 'pt-BR', { sensitivity: 'base' }));
        
            doc.setFontSize(16); doc.text("Escala por Oficiante", 14, 15);
            doc.setFontSize(10);

            
            const periodo = typeof calendar !== 'undefined' ? `Período: ${calendar.view.title}` : "";
            doc.text(periodo, 14, 22);
            let y = 30;
        
            oficiantesOrdenados.forEach(([id, nome]) => {
                if (!id) return;
                const itens = rawData.filter(e => 
                        String(e.id_oficiante).trim() === String(id).trim()
                    ).sort((a,b) => {
                    const dataA = (a.data || "").toString();
                    const dataB = (b.data || "").toString();
                    if (dataA !== dataB) return dataA.localeCompare(dataB);
                    return (turnosOrder[a.turno?.toUpperCase()] || 99) - (turnosOrder[b.turno?.toUpperCase()] || 99);
                });
                
                if (itens.length === 0) return;
                //const nome = itens[0].nome_oficiante || "Oficiante s/ nome";
        
                if(y > 230) { doc.addPage(); y = 20; }
        
                doc.setDrawColor(200); doc.setFillColor(245, 245, 245);
                doc.rect(14, y, 182, 8, 'F');
                doc.setFontSize(12); doc.setTextColor(0); doc.setFont(undefined, 'bold');
                doc.text(nome, 16, y + 6);
                y += 10;
        
                const rows = itens.map(e => {
                    const info = formatarDataComDia(e.data);
                    const diaReduzido = info.diaSemana.split('-')[0];
                    return [
                        info.diaSemana ? `${info.dataFormatada} (${diaReduzido})` : info.dataFormatada, 
                        e.turno || "", 
                        e.setor || ""
                    ];
                });
        
                doc.autoTable({ 
                    head: [['Data', 'Turno', 'Setor']], 
                    body: rows,

                    margin: { left: 14 },

        window.relatorioEscalaSetores = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape'); // Paisagem para caber todas colunas
             // 🔹 Data e hora de geração
                const agora = new Date();

                                    agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                // Pega largura da página
                const pageWidth = doc.internal.pageSize.getWidth();
                
                doc.setFontSize(9);
                doc.text(
                    `Gerado em: ${dataGeracao}`,
                    pageWidth - 14,
                    10,
                    { align: 'right' }
                );
            
            
        
            const rawData = typeof getFilteredData === 'function' ? getFilteredData() : [];
        
            if (!rawData.length) {
                alert("Nenhum dado encontrado.");
                return;
            }
        
            // Ordena por data
            rawData.sort((a,b)=> (a.data || "").localeCompare(b.data || ""));
        
            // Agrupar por data
            const grouped = {};
            rawData.forEach(e => {
                const d = e.data.substring(0,10);
                if (!grouped[d]) grouped[d] = [];
                grouped[d].push(e);
            });
        
            doc.setFontSize(15);

            doc.text(`Período: ${calendar.view.title}`, 14, 16);

            
            
            //doc.text(`Gerado em: ${dataGeracao}`, 14, 21);
        
            const rows = [];

                const info = formatarDataComDia(dateKey);

                    data: `${info.dataFormatada} ${info.diaSemana}`,
                    BAT1: [], BAT2: [], BAT3: [],
                    REC1: [], REC2: [],
                    SEL1: [], SEL2: [], SEL3: []
                };
        
                grouped[dateKey].forEach(e => {
        
                    const turno = (e.turno || "").toUpperCase().trim();

                    const turnoNum =
                        turno === "PRIMEIRO" ? "1" :

                        turno === "TERCEIRO" ? "3" :
                        "";
        
                    if (e.setor === "BATISTÉRIO") {
                        linha["BAT"+turnoNum].push(e.nome_oficiante);
                    }
        
                    if (e.setor === "RECEPÇÃO" && turnoNum !== "3") {

                        if (linha["REC"+turnoNum]) {
                    
                            const horaIni = formatarHoraSimples(e.hora_inicial || e.hora_inicio);
                            const horaFim = formatarHoraSimples(e.hora_final || e.hora_fim);
                    
                            const nomeFormatado = (horaIni && horaFim)
                                ? `${e.nome_oficiante} (${horaIni} às ${horaFim})`
                                : e.nome_oficiante;
                    
                            linha["REC"+turnoNum].push(nomeFormatado);
                        }
                    }
                    
                    if (e.setor === "SELAMENTO") {
                        linha["SEL"+turnoNum].push(e.nome_oficiante);
                    }
        
                });
        
                rows.push([
                    linha.data,
                    linha.BAT1.join("\n"),
                    linha.BAT2.join("\n"),
                    linha.BAT3.join("\n"),
                    linha.REC1.join("\n"),
                    linha.REC2.join("\n"),
                    linha.SEL1.join("\n"),
                    linha.SEL2.join("\n"),
                    linha.SEL3.join("\n")
                ]);
            });

                body: rows,
                styles: {

                    cellPadding: 0.6,      // 🔥 menos espaço interno
                    lineWidth: 0.4,
                    lineColor: [0,0,0],
                    valign: 'middle',
                    minCellHeight: 4       // 🔥 reduz altura mínima da linha
                },
                headStyles: {
                    fillColor: [40,40,40],
                    fontSize: 8,
                    textColor: 255,
                    lineWidth: 0.6           // 🔥 borda do cabeçalho mais forte
                },
                columnStyles: {
                    0: { 
                        cellWidth: 26,
                        fontStyle: 'bold'    // 🔥 DATA EM NEGRITO
                    }
                },
                didParseCell: function (data) {

                 // 🔴 Se for sábado, deixar data vermelha e negrito
                if (data.section === 'body' && data.column.index === 0) {
                
                    const texto = data.cell.raw || "";
                
                    if (texto.toUpperCase().includes("SÁB")) {
                        data.cell.styles.textColor = [200, 0, 0]; // vermelho
                        data.cell.styles.fontStyle = "bold";
                    }
                
                }   

                    
                const col = data.column.index;
            
                // 🔥 DATA maior
                if (data.section === 'body' && col === 0) {
                    data.cell.styles.fontSize = 9;
                    data.cell.styles.fontStyle = 'bold';
                }
            
                // Bordas
                data.cell.styles.lineWidth = 0.4;
            
                if (data.section !== 'body') return;
            
                // 🔵 BATISTÉRIO
                if (col >= 1 && col <= 3) {
                    data.cell.styles.fillColor = [220, 235, 255];

            }
        
            // Ordena por data
            rawData.sort((a,b)=> (a.data || "").localeCompare(b.data || ""));

            rawData.forEach(e => {

                if (!grouped[d]) grouped[d] = [];
                grouped[d].push(e);
            });
        
            doc.setFontSize(16);

            doc.setFontSize(10);
            doc.text(`Período: ${calendar.view.title}`, 14, 22);
        
            const rows = [];
        
            Object.keys(grouped).sort().forEach(dateKey => {
        
                const info = formatarDataComDia(dateKey);
        
                const linha = {
                    data: `${info.dataFormatada} ${info.diaSemana}`,
                    T1: [],
                    T2: [],
                    T3: []
                };
        
                grouped[dateKey].forEach(e => {

                    const turno = (e.turno || "").toUpperCase().trim();

                    const turnoNum =
                        turno === "PRIMEIRO" ? "1" :
                        (turno === "SEGUNDO" || turno === "SEGUNDO PARC") ? "2" :
                        turno === "TERCEIRO" ? "3" :
                        "";
        
                    let nomeFormatado = e.nome_oficiante;

                    if (setorSelecionado === "RECEPÇÃO") {
                    
                        const horaIni = formatarHoraSimples(e.hora_inicial || e.hora_inicio);
                        const horaFim = formatarHoraSimples(e.hora_final || e.hora_fim);
                    
                        if (horaIni && horaFim) {
                            nomeFormatado = `${e.nome_oficiante} (${horaIni} às ${horaFim})`;
                        }
                    }
                    
                    if (linha["T"+turnoNum]) {
                        linha["T"+turnoNum].push(nomeFormatado);
                    }
                });
        
                rows.push(linha);
            });
        
            // DEFINIR COLUNAS DINÂMICAS
            let head = [];
            let body = [];

                head = [["Data", "Turno 1", "Turno 2", "Turno 3"]];
        
                body = rows.map(l => [
                    l.data,
                    l.T1.join("\n"),
                    l.T2.join("\n"),
                    l.T3.join("\n")

            } else if (setorSelecionado === "RECEPÇÃO") {
        
                head = [["Data", "Turno 1", "Turno 2"]];
        
                body = rows.map(l => [
                    l.data,
                    l.T1.join("\n"),
                    l.T2.join("\n")
                ]);

                lineHeight: 1,

                fillColor: [40,40,40],
                textColor: 255
            },
            columnStyles: {
                0: { cellWidth: 35 }
            },
            didParseCell: function (data) {


                    if (data.section !== 'body') return;

                    const col = data.column.index;
                    const texto = data.cell.raw || "";
                    const textoUpper = texto.toUpperCase();
                
                    // 🔥 DATA maior e negrito
                    if (col === 0) {
                        data.cell.styles.fontSize = 9;
                        data.cell.styles.fontStyle = 'bold';
                
                        // 🔴 Sábado
                        if (textoUpper.includes("SÁB") || textoUpper.includes("SAB")) {
                            data.cell.styles.textColor = [200, 0, 0];
                        }
                    }
                
                    // Bordas
                    data.cell.styles.lineWidth = 0.4;
        
                // Ignora cabeçalho
                //if (data.section !== 'body') return;
        
                //const col = data.column.index;
        
                // Não pintar coluna Data
                //if (col === 0) return;
        
                // 🔵 BATISTÉRIO
                if (setorSelecionado === "BATISTÉRIO") {
                    data.cell.styles.fillColor = [220, 235, 255];
                }
        
                // 🟡 RECEPÇÃO
                if (setorSelecionado === "RECEPÇÃO") {
                    data.cell.styles.fillColor = [255, 248, 200];
                }
        
                // 🌸 SELAMENTO
                if (setorSelecionado === "SELAMENTO") {
                    data.cell.styles.fillColor = [255, 220, 235];
                }

                const dataHora = agora.toLocaleString('pt-BR', {

                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // Fonte menor

                // Alinhar à direita (largura da página)
                const pageWidth = doc.internal.pageSize.getWidth();

                    align: 'right'
                });
            },
            theme: 'grid'
        });
        
            doc.save(`relatorio_${setorSelecionado.toLowerCase()}.pdf`);
        };
        
        // --- ACTIONS ---

        async function uploadFile(file) {
            if(!file) return "";
            const fd = new FormData();
            fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
            const data = await res.json();
            return data.secure_url || "";
        }

        window.openOficianteModal = () => {
            document.getElementById('form-oficiante').reset();
            document.getElementById('oficiante-id').value = '';
            document.getElementById('oficiante-modal-title').innerText = 'Novo Oficiante';
            document.getElementById('prev-foto1').classList.add('hidden');
            document.getElementById('prev-foto2').classList.add('hidden');
            openModal('modal-oficiante');
        };

        window.editOficiante = (o) => {
            document.getElementById('oficiante-id').value = o.id;
            document.getElementById('oficiante-nome').value = o.nome;
            document.getElementById('oficiante-modal-title').innerText = 'Editar Oficiante';
            if(o.foto1) document.getElementById('prev-foto1').classList.remove('hidden');
            if(o.foto2) document.getElementById('prev-foto2').classList.remove('hidden');
            openModal('modal-oficiante');
        };

        document.getElementById('form-oficiante').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('oficiante-id').value;
            const f1File = document.getElementById('oficiante-foto1').files[0];
            const f2File = document.getElementById('oficiante-foto2').files[0];
            
            let f1 = f1File ? await uploadFile(f1File) : "";
            let f2 = f2File ? await uploadFile(f2File) : "";

            // Se for edição e não subiu nova foto, mantém a antiga (o backend precisa tratar isso ou enviamos a URL atual)
            // Para simplicidade, assumimos que se o campo estiver vazio na edição o backend mantém.
            
            const payload = { 
                action: id ? "updateOficiante" : "addOficiante", 
                id, 
                nome: document.getElementById('oficiante-nome').value, 
                foto1: f1, 
                foto2: f2 
            };
            
            const res = await apiCall(payload);
            if (res.status === "ok") { closeModal('modal-oficiante'); fetchData(); e.target.reset(); }
        };

        document.getElementById('form-escala').onsubmit = async (e) => {
            e.preventDefault();
            const ofi = document.getElementById('escala-oficiante');
            const idOrig = String(document.getElementById('escala-id-original').value || "").trim()
            
            const payload = {
                action: idOrig ? "updateEscala" : "addEscala",
                data: document.getElementById('escala-data').value,
                id_oficiante: ofi.value,
                nome_oficiante: ofi.options[ofi.selectedIndex].text,
                setor: document.getElementById('escala-setor').value,
                turno: document.getElementById('escala-turno').value,
                id_original: idOrig,
                data_original: document.getElementById('escala-data-original').value,
                turno_original: document.getElementById('escala-turno-original').value,
                hora_inicial: document.getElementById('escala-hora-inicial').value,
                hora_final: document.getElementById('escala-hora-final').value
            };
            
            const res = await apiCall(payload);
            if (res.status === "ok") { closeModal('modal-escala'); fetchData(); }
        };

        window.deleteOficiante = async (id) => {
            if(confirm("Deseja realmente excluir este oficiante? Isso não removerá escalas passadas, mas impedirá novas.")) {
                const res = await apiCall({ action: "deleteOficiante", id });
                if(res.status === "ok") fetchData();
            }
        };

        window.deleteEscalaItem = async (id, data, turno) => {
            if(confirm("Remover este item da escala?")) {
                const res = await apiCall({ action: "deleteEscala", id_oficiante: id, data, turno });
                if(res.status === "ok") fetchData();
                renderGestaoEscala();
                renderEscalaTable();
                refreshCalendar();
            }
        };

            const options = '<option value="">Selecione...</option>' + oficiantes.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
            document.getElementById('escala-oficiante').innerHTML = options;

        }

        window.switchTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            if (tab === 'calendar' && calendar) setTimeout(() => calendar.updateSize(), 300);
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

            document.getElementById('form-escala').reset(); 
            document.getElementById('escala-id-original').value = ''; 
            document.getElementById('escala-modal-title').innerText = 'Agendar Escala';
            openModal('modal-escala'); 
        };

        window.editEscalaItem = (item) => { 
            // 1. Abre o modal e limpa estados anteriores
            openEscalaModal();
            document.getElementById('escala-modal-title').innerText = 'Editar Escala';
            
            // 2. Grava os IDs originais (necessário para o seu escala.gs localizar a linha certa)
            document.getElementById('escala-id-original').value = item.id_oficiante;
            document.getElementById('escala-data-original').value = item.data.substring(0, 10);
            document.getElementById('escala-turno-original').value = item.turno;
            
            // 3. Preenche os campos básicos do formulário
            document.getElementById('escala-oficiante').value = item.id_oficiante;
            document.getElementById('escala-data').value = item.data.substring(0, 10);
            document.getElementById('escala-setor').value = item.setor;
            document.getElementById('escala-turno').value = item.turno;
        
            // 4. Lógica específica para o Container de Recepção
            const containerRecepcao = document.getElementById('container-horarios-recepcao');
            const selectHoraInicial = document.getElementById('escala-hora-inicial');
            const selectHoraFinal = document.getElementById('escala-hora-final');
        
            if (item.setor && item.setor.toUpperCase().includes('RECEPÇÃO')) {
                // Mostra o campo azul se for recepção
                containerRecepcao.classList.remove('hidden');
                // Preenche os selects com os valores que vieram da planilha
                selectHoraInicial.value = item.hora_inicial || "";
                selectHoraFinal.value = item.hora_final || "";
            } else {
                // Esconde se for outro setor
                containerRecepcao.classList.add('hidden');
                selectHoraInicial.value = "";
                selectHoraFinal.value = "";
            }
        };

        document.addEventListener("DOMContentLoaded", function(){

            document.getElementById("oficiante-nome").addEventListener("input", function(){
                this.value = this.value.toUpperCase();
            });
        
        });

        document.querySelectorAll("#gestao-month-filter,#gestao-oficiante-filter,#gestao-turno-filter")
    	.forEach(el => el.addEventListener("change", renderGestaoEscala));
        
        function showLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
    </script>
